<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
    <section class="panel">
        <h1>Unable to complete request</h1>
        <p class="error" th:text="${errorMessage}">Something went wrong.</p>
        <a th:href="@{/}">Return to upload page</a>
    </section>
</main>
</body>
</html>
