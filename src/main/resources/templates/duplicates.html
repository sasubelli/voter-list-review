<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Review</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
    <section class="panel">
        <div class="title-row">
            <h1>Possible Duplicate Records</h1>
            <a th:href="@{/analysis/{jobId}(jobId=${result.jobId})}">Back to summary</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>Label</th>
                <th>Score</th>
                <th>Reason</th>
                <th>Left record</th>
                <th>Right record</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="match : ${result.duplicateMatches}">
                <td th:text="${match.label}"></td>
                <td th:text="${#numbers.formatDecimal(match.score, 1, 2)}"></td>
                <td th:text="${match.reason}"></td>
                <td th:text="${match.primaryRecord.name + ' (' + match.primaryRecord.voterId + ')'}"></td>
                <td th:text="${match.secondaryRecord.name + ' (' + match.secondaryRecord.voterId + ')'}"></td>
            </tr>
            <tr th:if="${result.duplicateMatches.isEmpty()}">
                <td colspan="5">No duplicate candidates were flagged for this upload.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
