<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deceased Name Search</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
    <section class="panel">
        <div class="title-row">
            <h1>Possible Deceased-Name Search</h1>
            <a th:href="@{/analysis/{jobId}(jobId=${result.jobId})}">Back to summary</a>
        </div>
        <form method="post" th:action="@{/analysis/{jobId}/deceased-search(jobId=${result.jobId})}" th:object="${request}" class="stack">
            <label>
                Name
                <input type="text" th:field="*{name}" required>
                <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </label>
            <label>
                Voter ID / EPIC
                <input type="text" th:field="*{voterId}">
            </label>
            <label>
                Age or DOB
                <input type="text" th:field="*{ageOrDob}">
            </label>
            <label>
                Address
                <input type="text" th:field="*{address}">
            </label>
            <button type="submit">Search Matches</button>
        </form>
    </section>

    <section class="panel">
        <div class="title-row">
            <h2>Search Results</h2>
            <a th:href="@{/analysis/{jobId}/export/deceased(jobId=${result.jobId})}">Export current results</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>Label</th>
                <th>Score</th>
                <th>Reason</th>
                <th>Matched voter</th>
                <th>Address</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="match : ${result.lastSearchResults}">
                <td th:text="${match.label}"></td>
                <td th:text="${#numbers.formatDecimal(match.score, 1, 2)}"></td>
                <td th:text="${match.reason}"></td>
                <td th:text="${match.primaryRecord.name + ' (' + match.primaryRecord.voterId + ')'}"></td>
                <td th:text="${match.primaryRecord.address}"></td>
            </tr>
            <tr th:if="${result.lastSearchResults.isEmpty()}">
                <td colspan="5">Run a search to see possible phonetic matches.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
